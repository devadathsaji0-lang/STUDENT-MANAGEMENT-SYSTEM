<!DOCTYPE html>
<html>
<head>
  <title>Student Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" style="max-width:400px; margin:50px auto; padding:20px; background:#fff; color:#000; border-radius:8px;">
  <h2>Login</h2>
  <select id="userRole">
    <option value="teacher">Teacher</option>
    <option value="student">Student</option>
  </select>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginError" style="color:red"></p>
</div>

<div id="app" style="display:none">
  <h1>Student Management System</h1>
  <button onclick="logout()" id="logoutBtn" style="float:right;">Logout</button>

  <div class="tabs">
    <button onclick="showTab('students')">Students</button>
    <button onclick="showTab('courses')">Courses</button>
    <button onclick="showTab('faculty')">Faculty</button>
    <button onclick="showTab('enroll')">Course Registration</button>
    <button onclick="showTab('marks')">Marks & Results</button>
    <button onclick="showTab('attendance')" id="attendanceTabBtn">Attendance</button>
  </div>

  <div id="students" class="tab">
    <h2>Add/Update Student</h2>
    <input id="s_id" placeholder="Student ID">
    <input id="s_name" placeholder="Name">
    <input id="s_phone" placeholder="Phone">
    <button onclick="addStudent()">Save Student</button>
    <div id="student_list"></div>
  </div>

  <div id="courses" class="tab" style="display:none">
    <h2>Courses</h2>
    <input id="c_id" placeholder="Course ID">
    <input id="c_name" placeholder="Course Name">
    <input id="c_credits" placeholder="Credits">
    <button onclick="addCourse()">Save Course</button>
    <div id="course_list"></div>
  </div>

  <div id="faculty" class="tab" style="display:none">
    <h2>Faculty</h2>
    <input id="f_id" placeholder="Faculty ID">
    <input id="f_name" placeholder="Name">
    <input id="f_dept" placeholder="Department">
    <button onclick="addFaculty()">Save Faculty</button>
    <div id="faculty_list"></div>
  </div>

  <div id="enroll" class="tab" style="display:none">
    <h2>Course Registration</h2>
    <select id="e_student"></select>
    <select id="e_course"></select>
    <button onclick="enrollStudent()">Enroll</button>
    <div id="enroll_list"></div>
  </div>

  <div id="marks" class="tab" style="display:none">
    <h2>Marks & Results</h2>
    <select id="m_student"></select>
    <select id="m_course"></select>
    <input id="m_marks" placeholder="Marks" type="number">
    <button onclick="addMarks()">Add Marks</button>
    <div id="marks_list"></div>
  </div>

  <div id="attendance" class="tab" style="display:none">
    <h2>Attendance</h2>
    <input type="date" id="attendanceDate" onchange="loadAttendance()">
    <div id="attendanceList"></div>
    <button onclick="saveAttendance()">Save Attendance</button>
    <h3>Monthly Report</h3>
    <select id="reportMonth" onchange="loadMonthlyReport()">
      <option value="1">Jan</option><option value="2">Feb</option>
      <option value="3">Mar</option><option value="4">Apr</option>
      <option value="5">May</option><option value="6">Jun</option>
      <option value="7">Jul</option><option value="8">Aug</option>
      <option value="9">Sep</option><option value="10">Oct</option>
      <option value="11">Nov</option><option value="12">Dec</option>
    </select>
    <div id="monthlyReport"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
