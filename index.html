<!DOCTYPE html>
<html>
<head>
  <title>Student Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen">
  <h2>Login</h2>
  <select id="userRole">
    <option value="teacher">Teacher</option>
    <option value="student">Student</option>
  </select>
  <input type="text" id="username" placeholder="Username/ID">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <p id="loginError"></p>
  <p style="font-size:12px;color:#666;">Teacher: admin / any password<br>Student: StudentID / any password</p>
</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>Student Management System</h1>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="students">Students</button>
    <button class="tab-btn" data-tab="courses">Courses</button>
    <button class="tab-btn" data-tab="faculty">Faculty</button>
    <button class="tab-btn" data-tab="enroll">Registration</button>
    <button class="tab-btn" data-tab="marks">Grade Card</button>
    <button class="tab-btn" data-tab="attendance" id="attendanceTabBtn">Attendance</button>
  </div>

  <div id="students" class="tab active">
    <h2>Add/Update Student</h2>
    <div class="student-form">
      <div class="photo-upload">
        <img id="s_photo_preview" src="https://via.placeholder.com/120x150?text=Photo">
        <input type="file" id="s_photo" accept="image/*">
        <label for="s_photo">Upload Photo</label>
      </div>
      <div>
        <input id="s_id" placeholder="Student ID">
        <input id="s_name" placeholder="Name">
        <input id="s_phone" placeholder="Phone">
        <input id="s_course" placeholder="Course/Branch">
        <button id="saveStudentBtn">Save Student</button>
      </div>
    </div>
    <div id="student_list"></div>
  </div>

  <div id="courses" class="tab">
    <h2>Courses</h2>
    <input id="c_id" placeholder="Course ID">
    <input id="c_name" placeholder="Course Name">
    <input id="c_credits" placeholder="Credits" type="number">
    <button id="saveCourseBtn">Save Course</button>
    <div id="course_list"></div>
  </div>

  <div id="faculty" class="tab">
    <h2>Faculty</h2>
    <input id="f_id" placeholder="Faculty ID">
    <input id="f_name" placeholder="Name">
    <input id="f_dept" placeholder="Department">
    <button id="saveFacultyBtn">Save Faculty</button>
    <div id="faculty_list"></div>
  </div>

  <div id="enroll" class="tab">
    <h2>Course Registration</h2>
    <select id="e_student"></select>
    <select id="e_course"></select>
    <button id="enrollBtn">Enroll</button>
    <div id="enroll_list"></div>
  </div>

  <div id="marks" class="tab">
    <h2>Semester Grade Card</h2>
    <select id="m_student"></select>
    <div id="gradeCardContainer"></div>
  </div>

  <div id="attendance" class="tab">
    <h2>Attendance</h2>
    <input type="date" id="attendanceDate">
    <div id="attendanceList"></div>
    <button id="saveAttendanceBtn">Save Attendance</button>
    <h3>Monthly Report</h3>
    <select id="reportMonth">
      <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option><option value="4">Apr</option>
      <option value="5">May</option><option value="6">Jun</option><option value="7">Jul</option><option value="8">Aug</option>
      <option value="9">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
    </select>
    <div id="monthlyReport"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
